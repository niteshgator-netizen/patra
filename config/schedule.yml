# https://github.com/ondrejbartas/sidekiq-cron
# use https://crontab.guru/ to validate
# validations for this file exist in /spec/configs/schedule_spec.rb

# executed daily at 0000 UTC
# schedules daily deferred jobs at stable times for each installation
internal_check_new_versions_job:
  cron: '0 0 * * *'
  class: 'Internal::TriggerDailyScheduledItemsJob'
  queue: scheduled_jobs
# # executed At every 5th minute..
trigger_scheduled_items_job:
  cron: '*/5 * * * *'
  class: 'TriggerScheduledItemsJob'
  queue: scheduled_jobs

# executed hourly for scheduled jobs that do not need minute-level cadence
trigger_hourly_scheduled_items_job:
  cron: '0 * * * *'
  class: 'Internal::TriggerHourlyScheduledItemsJob'
  queue: scheduled_jobs

# executed At every minute..
trigger_imap_email_inboxes_job:
  cron: '*/1 * * * *'
  class: 'Inboxes::FetchImapEmailInboxesJob'
  queue: scheduled_jobs

# executed daily at 2230 UTC
# which is our lowest traffic time
remove_stale_contact_inboxes_job.rb:
  cron: '30 22 * * *'
  class: 'Internal::RemoveStaleContactInboxesJob'
  queue: scheduled_jobs

# executed daily at 2230 UTC
# which is our lowest traffic time
remove_stale_redis_keys_job.rb:
  cron: '30 22 * * *'
  class: 'Internal::RemoveStaleRedisKeysJob'
  queue: scheduled_jobs

# DISABLED: investigating if this job is the source of orphan conversations
# #executed daily at 0430 UTC
# # which will be IST 10:00 AM
# process_stale_contacts_job:
#   cron: '30 04 * * *'
#   class: 'Internal::ProcessStaleContactsJob'
#   queue: housekeeping

# executed daily at 0100 UTC
# to delete accounts marked for deletion
delete_accounts_job:
  cron: '0 1 * * *'
  class: 'Internal::DeleteAccountsJob'
  queue: scheduled_jobs

# executed every 30 minutes for assignment_v2
periodic_assignment_job:
  cron: '*/30 * * * *'
  class: 'AutoAssignment::PeriodicAssignmentJob'
  queue: scheduled_jobs

# executed daily at 2230 UTC
# removes old notifications (>1 month) and trims to 300 per user
remove_old_notification_job:
  cron: '30 22 * * *'
  class: 'Notification::RemoveOldNotificationJob'
  queue: purgable

# executed every 12 hours
# to remove orphan conversations without contact
remove_orphan_conversations_job:
  cron: '0 */12 * * *'
  class: 'Internal::RemoveOrphanConversationsJob'
  queue: housekeeping

# executed weekly (Sunday 0300 UTC) — refresh Facebook page tokens for Patra bridge inboxes
patra_refresh_fb_tokens_job:
  cron: '0 3 * * 0'
  class: 'Patra::RefreshFbTokensJob'
  queue: scheduled_jobs

# Daily at midnight UTC — Telegram summary of yesterday's activity per account
reports_daily_summary_job:
  cron: '0 0 * * *'
  class: 'Reports::DailySummaryJob'
  queue: scheduled_jobs

# Daily at 10:00 UTC — dormant Facebook Messenger players (adjust cron for local 10 AM if needed)
reengagement_dormant_player_job:
  cron: '0 10 * * *'
  class: 'Reengagement::DormantPlayerJob'
  queue: scheduled_jobs

# Every hour — auto-resolve open conversations with no activity (configurable per account)
conversations_auto_resolve_job:
  cron: '0 * * * *'
  class: 'Conversations::AutoResolveJob'
  queue: low

# Every minute — SLA violation checks
sla_check_violations_job:
  cron: '*/1 * * * *'
  class: 'Sla::CheckViolationsJob'
  queue: low

# Every minute — send scheduled messages
messages_send_scheduled_job:
  cron: '*/1 * * * *'
  class: 'Messages::SendScheduledJob'
  queue: low

# Daily — update contact lifecycle stages
contacts_lifecycle_update_job:
  cron: '0 6 * * *'
  class: 'Contacts::LifecycleUpdateJob'
  queue: low

# Daily — auto-tag contact segments
contacts_segmentation_job:
  cron: '0 7 * * *'
  class: 'Contacts::SegmentationJob'
  queue: low

# Daily — re-engage inactive players
contacts_re_engage_job:
  cron: '0 8 * * *'
  class: 'Contacts::ReEngageJob'
  queue: low

# Every hour — auto-resolve open conversations with no activity in 24+ hours
auto_resolve_stale_conversations_job:
  cron: '0 * * * *'
  class: 'AutoResolveStaleConversationsJob'
  queue: low

# Daily at 09:00 UTC — log dormant contacts eligible for re-engagement
reengage_dormant_contacts_job:
  cron: '0 9 * * *'
  class: 'ReengageDormantContactsJob'
  queue: low

# Every 15 minutes — check pending payment timeouts (log-only for now)
pending_payment_timeout_job:
  cron: '*/15 * * * *'
  class: 'PendingPaymentTimeoutJob'
  queue: low

# Every 4 hours — refresh Cluster 1 ASP.NET + Cluster 2 Laravel panel sessions before expiry (Ship 4)
games_proactive_session_refresh_job:
  cron: '15 */4 * * *'
  class: 'Games::ProactiveSessionRefreshJob'
  queue: low
  description: 'Refresh Cluster 1 ASP.NET + Cluster 2 Laravel panel sessions before they expire (Ship 4)'
